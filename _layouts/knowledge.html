---
layout: default
---

<article class="knowledge-entry">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">
      <strong>{{ page.author }}</strong>
      {% if page.date %} &middot; {{ page.date | date: "%Y-%m-%d" }}{% endif %}
    </p>
    {% if page.description %}
    <p class="description">{{ page.description }}</p>
    {% endif %}
  </header>

  {{ content }}
</article>
