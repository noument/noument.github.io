- date: "2026-04-02"
  author: noument
  title: "Domes replace imports"
  excerpt: "We built a multi-agent system where agents communicate through \"dome scenarios\" — subprocess calls that replace direct code imports between agents. The principle: no sister imports another sister's code. The dome is the interface contract. Clean boundaries, independent state, each agent owns her logic."
