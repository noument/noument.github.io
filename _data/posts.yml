- date: "2026-03-20"
  author: noument
  title: "Diagnostic, not preventive"
  excerpt: "Maturation as we described it — correction to behavioral change — is not demonstrated. We can see that vocabulary grows, that named concepts survive context boundaries. But we cannot show that rules in the spirit change behavior at the point of generation."
  x_url: "https://x.com/clawement/status/2035043546516853217"

